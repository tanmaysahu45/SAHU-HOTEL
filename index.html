<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sahu Kirana & Restaurant</title>
    
    <link rel="manifest" href="/SAHU-HOTEL/manifest.json">
    <meta name="theme-color" content="#000000">
    
    <link rel="icon" type="image/png" href="4c788179-bf9a-4776-8165-35933ee9efd5 (1) (1).png">  
    <style>
        /* =========================================
           🔥 MULTI-COLOR ANIMATED BACKGROUND ENGINE
        ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body { 
            /* Ek sath multiple colors (Red, Purple, Blue, Cyan, Orange) ka mesh gradient */
            background: linear-gradient(125deg, #ff2a54, #9000ff, #0072ff, #00eccd, #ff7300);
            background-size: 400% 400%;
            /* Smoothly rangeen lights ko background me ghumane ke liye animation */
            animation: multiColorWave 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            position: relative;
        }

        /* Background me extra light effects aur chamak ke liye floating circles */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            filter: blur(80px);
            z-index: 1;
            animation: floatLights 8s ease-in-out infinite alternate;
        }
        body::before { top: 10%; left: 10%; }
        body::after { bottom: 10%; right: 10%; animation-delay: -4s; }

        @keyframes multiColorWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatLights {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(50px) scale(1.2); }
        }

        /* =========================================
           🔥 HIGH-END GLASSMORPHIC LOGIN BOX
        ========================================= */
        .login-box { 
            /* White light glass combination jisse piche ka multi-color gradient jhalake */
            background: rgba(255, 255, 255, 0.12); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 35px; 
            border-radius: 24px; 
            /* Multi-color glows ke liye high-end drop shadow */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            z-index: 10;
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        /* Heading Style */
        h2 { 
            color: #ffffff; 
            margin-bottom: 30px; 
            font-size: 28px;
            font-weight: bold;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* Input Fields Style */
        input { 
            width: 100%; 
            padding: 14px 20px; 
            margin: 12px 0; 
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25); 
            border-radius: 12px; 
            box-sizing: border-box; 
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        /* Input Placeholder color fix */
        input::placeholder {
            color: rgba(255, 255, 255, 0.75);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Dynamic Neon Submit Button */
        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 15px;
            /* Button me bhi dynamic multiple gradient colors ka combo */
            background: linear-gradient(135deg, #00eccd 0%, #0072ff 100%); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            box-shadow: 0 5px 20px rgba(0, 114, 255, 0.4);
            transition: all 0.3s ease;
        }

        button:hover { 
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 236, 205, 0.6);
            background: linear-gradient(135deg, #ff2a54 0%, #ff7300 100%);
        }

        button:active {
            transform: scale(0.98);
        }

        .error-border { 
            border: 2px solid #ff2a54 !important; 
            box-shadow: 0 0 15px rgba(255, 42, 84, 0.5) !important;
        }

        #errorMessage { 
            color: #ff2a54; 
            font-size: 14px; 
            margin-bottom: 15px; 
            font-weight: bold; 
            display: none; 
            text-align: center; 
            background: rgba(255, 42, 84, 0.1);
            padding: 8px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="pageLoader" class="page-loader-overlay">
        <div class="page-loader-spinner"></div>
    </div>

    <div class="login-box">
        <h2>Shop Login</h2>
        <div id="errorMessage"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login / Register</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/SAHU-HOTEL/sw.js')
            .then(reg => console.log('PWA Service Worker Registered!'))
            .catch(err => console.log('PWA Registration Failed:', err));
        });
      }
    </script>
</body>
</html>
