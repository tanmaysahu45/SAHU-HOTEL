<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing - Sahu Hotel</title>
    
    <meta name="theme-color" content="#0ef">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #1f242d; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden; }
        
        .navbar { background-color: #2c3341; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0ef; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .logo { font-size: 16px; font-weight: 700; color: #fff; }
        .logo span { color: #0ef; }
        
        .nav-btns { display: flex; gap: 8px; }
        .history-btn { background: transparent; border: 1px solid #ffc107; color: #ffc107; padding: 6px 12px; border-radius: 4px; font-weight: 600; font-size: 12px; cursor: pointer; transition: 0.3s; }
        .history-btn:hover { background: #ffc107; color: #1f242d; }
        .back-btn { background: #ff4d4d; color: #fff; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-weight: 600; font-size: 12px; transition: 0.3s; border: none; cursor: pointer; }
        
        .billing-container { display: flex; flex-wrap: wrap; gap: 15px; padding: 15px; flex: 1; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* SCANNER & SEARCH AREA */
        .scanner-section { flex: 1; min-width: 280px; background: #2c3341; border-radius: 8px; padding: 15px; border: 1px solid rgba(0, 238, 255, 0.2); display: flex; flex-direction: column; }
        .section-title { font-size: 15px; color: #0ef; margin-bottom: 10px; font-weight: 600; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        
        #reader { width: 100%; min-height: 180px; background: #1f242d; border-radius: 6px; border: 2px dashed #0ef; overflow: hidden; margin-bottom: 10px; }
        .camera-toggle-btn { background: #0ef; color: #1f242d; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }
        
        .input-group { margin-bottom: 10px; }
        .input-group label { display: block; font-size: 11px; color: #0ef; margin-bottom: 4px; font-weight: 600; }
        .manual-entry { display: flex; gap: 6px; }
        .manual-entry input, .search-entry input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #1f242d; background: #1f242d; color: #fff; outline: none; font-size: 12px;}
        .manual-entry input:focus, .search-entry input:focus { border-color: #0ef; }
        .manual-entry button { background: #ffc107; color: #1f242d; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px;}

        .search-entry { position: relative; }
        .suggestions-box { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: #2c3341; border: 1px solid rgba(0, 238, 255, 0.3); border-radius: 6px; margin-top: 4px; max-height: 150px; overflow-y: auto; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
        .suggestion-item { padding: 10px; font-size: 12px; color: #fff; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;}
        .suggestion-item:hover { background: #1f242d; color: #0ef; border-left: 2px solid #0ef;}
        .sugg-price { color: #aaa; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;}

        /* CART AREA & TABS */
        .cart-section { flex: 1.5; min-width: 280px; background: #2c3341; border-radius: 8px; padding: 15px; border: 1px solid rgba(0, 238, 255, 0.2); display: flex; flex-direction: column; }
        
        .tabs-container { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tabs-container::-webkit-scrollbar { display: none; }
        .bill-tab { background: #1f242d; color: #aaa; border: 1px solid rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: 600; font-size: 11px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .bill-tab.active { background: #0ef; color: #1f242d; border-color: #0ef; }
        .close-tab-btn { font-size: 12px; font-weight: bold; color: inherit; opacity: 0.7; }
        .add-tab-btn { background: #ffc107; color: #1f242d; border: none; padding: 6px 12px; border-radius: 6px 6px 0 0; cursor: pointer; font-weight: bold; font-size: 11px; white-space: nowrap; }

        .customer-info-box { display: flex; gap: 8px; margin-bottom: 10px; background: #1f242d; padding: 8px; border-radius: 6px; border: 1px dashed rgba(0, 238, 255, 0.3); }
        .customer-info-box input { flex: 1; padding: 8px; background: #2c3341; border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 4px; outline: none; font-size: 12px; }

        .cart-table-wrapper { flex: 1; background: #1f242d; border-radius: 6px; padding: 5px; overflow-y: auto; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); min-height: 150px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 8px; color: #0ef; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px; position: sticky; top: 0; background: #1f242d; z-index: 10; }
        td { padding: 8px; font-size: 11px; color: #ddd; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .qty-controls { display: flex; align-items: center; gap: 4px; }
        .qty-btn { background: #323946; color: #fff; border: none; width: 20px; height: 20px; border-radius: 3px; cursor: pointer; font-weight: bold; font-size: 12px;}
        .del-item { color: #ff4d4d; cursor: pointer; font-weight: bold; font-size: 14px; text-align: center; }

        .total-box { background: #1f242d; padding: 10px 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #0ef; margin-bottom: 10px; }
        .total-box h3 { font-size: 14px; color: #fff; display: flex; align-items: center; gap: 10px;}
        .sync-status { font-size: 10px; color: #aaa; font-weight: normal; }
        .total-box .amount { font-size: 18px; color: #0ef; font-weight: 700; }

        .action-btns { display: flex; gap: 6px; flex-wrap: wrap;}
        .action-btns button { flex: 1; min-width: 100px; padding: 10px; border: none; border-radius: 6px; font-weight: bold; font-size: 11px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 4px;}
        
        .btn-print { background: #ffc107; color: #1f242d; }
        .btn-whatsapp { background: #25D366; color: #fff; }
        .btn-clear { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); }

        /* 🔥 HISTORY MODAL STYLING (COMPACT) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 99999; justify-content: center; align-items: center; padding: 10px; backdrop-filter: blur(5px); }
        .modal-box { background: #2c3341; padding: 15px; border-radius: 12px; width: 100%; max-width: 600px; position: relative; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border: 1px solid rgba(0,238,255,0.2); }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; font-weight: bold; color: #aaa; cursor: pointer; }
        
        .history-card { background: #1f242d; border: 1px solid rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .history-info h4 { color: #0ef; margin-bottom: 2px; font-size: 13px; }
        .history-info p { font-size: 11px; color: #aaa; margin-bottom: 0;}
        .history-actions button { background: #ffc107; color: #1f242d; border: none; padding: 6px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }

        @media (max-width: 768px) {
            .billing-container { flex-direction: column; padding: 5px; gap: 8px;}
            .scanner-section, .cart-section { min-width: 100%; padding: 10px;}
            .customer-info-box { flex-direction: column; gap: 6px; padding: 6px;}
            .input-group label { font-size: 10px; }
            table th, table td { padding: 6px; font-size: 10px;}
            .total-box { padding: 8px 10px;}
            .total-box h3 { font-size: 13px; }
            .total-box .amount { font-size: 16px; }
            .action-btns button { padding: 8px; font-size: 10px;}
            .history-card { flex-direction: column; align-items: flex-start; gap: 8px; }
            .history-actions { width: 100%; }
            .history-actions button { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">Sahu <span>POS</span></div>
        <div class="nav-btns">
            <button class="history-btn" onclick="openHistoryModal()">📜 History</button>
            <a href="home.html" class="back-btn">⬅ Back</a>
        </div>
    </header>

    <div class="billing-container">
        
        <div class="scanner-section">
            <div class="section-title">
                <span>📷 Scan Barcode</span>
                <button class="camera-toggle-btn" id="camToggleBtn" onclick="toggleScanner()">Start Camera</button>
            </div>
            
            <div id="reader"></div>
            
            <div class="input-group">
                <label>Barcode Number:</label>
                <div class="manual-entry">
                    <input type="text" placeholder="Type Barcode..." id="manualBarcode" onkeypress="handleManualEntry(event)">
                    <button type="button" onclick="processManualBarcode()">Add</button>
                </div>
            </div>

            <div style="text-align: center; color: #666; font-size: 10px; margin: 5px 0;">— OR —</div>

            <div class="input-group search-entry">
                <label>🔍 Search Item by Name:</label>
                <input type="text" placeholder="Type product name (e.g. Samosa)..." id="searchItemName" autocomplete="off" oninput="showNameSuggestions(this.value)">
                <div id="nameSuggestions" class="suggestions-box"></div>
            </div>
        </div>

        <div class="cart-section">
            <div class="tabs-container" id="tabsContainer"></div>

            <div class="customer-info-box">
                <input type="text" id="custName" placeholder="👤 Grahak Ka Naam (Optional)" oninput="updateCustomerInfo()">
                <input type="number" id="custPhone" placeholder="📱 WhatsApp Number (Optional)" oninput="updateCustomerInfo()">
            </div>
            
            <div class="cart-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Rate</th>
                            <th>Qty</th>
                            <th>Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="cartBody">
                        <tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">Scan or Search items to start</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="total-box">
                <h3>Grand Total: <span id="syncStatus" class="sync-status"></span></h3>
                <div class="amount" id="grandTotalAmt">₹0</div>
            </div>

            <div class="action-btns">
                <button class="btn-clear" onclick="clearCurrentBill()">🗑 Clear</button>
                <button class="btn-whatsapp" onclick="sendWhatsAppBill()">💬 WhatsApp</button>
                <button class="btn-print" onclick="generatePDFBill()">🖨️ PDF</button>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-modal" onclick="closeHistoryModal()">×</span>
            <h3 style="color:#0ef; margin-bottom: 15px; font-size:18px;">📜 Cloud Billing History</h3>
            <div id="historyListContainer" style="max-height: 350px; overflow-y: auto; padding-right: 5px;"></div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const DB_URL = "https://sahu-hotel-app-default-rtdb.firebaseio.com";
        let productsDatabase = [];
        let html5QrcodeScanner = null;
        let isScannerRunning = false;
        let saveTimeout = null; // For auto-save debounce

        if (!localStorage.getItem('currentUser')) window.location.replace("index.html");

        function playBeep() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = 1000;
            gainNode.gain.setValueAtTime(0.1, context.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(context.destination);
            oscillator.start();
            oscillator.stop(context.currentTime + 0.1);
        }

        window.addEventListener('load', async () => {
            try {
                let res = await fetch(`${DB_URL}/products.json`);
                let data = await res.json();
                if (data) productsDatabase = Object.keys(data).map(key => ({ id: key, ...data[key] })).reverse();
            } catch(e) {}
            
            initMultiBillSystem();

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('view') === 'history') openHistoryModal();
        });

        // --- 2. MULTI-BILL TABS ---
        let billsList = [];
        let activeBillId = null;

        function initMultiBillSystem() {
            const savedData = localStorage.getItem('sahuSavedBills');
            if (savedData) {
                billsList = JSON.parse(savedData);
                if(billsList.length > 0) activeBillId = billsList[0].id;
            }
            if (billsList.length === 0) createNewBill();
            else { renderTabs(); loadActiveBillToUI(); }
        }

        function saveToLocalMemory() {
            localStorage.setItem('sahuSavedBills', JSON.stringify(billsList));
        }

        function createNewBill(prefilledData = null) {
            const newId = Date.now().toString();
            billsList.push({
                id: newId,
                name: prefilledData ? `Edit: ${prefilledData.custName || 'Guest'}` : `Grahak ${billsList.length + 1}`,
                custName: prefilledData ? (prefilledData.custName === 'Guest' ? '' : prefilledData.custName) : '',
                custPhone: prefilledData ? prefilledData.custPhone : '',
                items: prefilledData ? prefilledData.items : [],
                cloudKey: prefilledData ? prefilledData.cloudKey : null
            });
            activeBillId = newId;
            saveToLocalMemory();
            renderTabs();
            loadActiveBillToUI();
        }

        function switchBill(id) {
            activeBillId = id;
            loadActiveBillToUI();
            renderTabs();
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            billsList.forEach((bill, index) => {
                const isActive = bill.id === activeBillId ? 'active' : '';
                const title = bill.custName ? bill.custName : `Grahak ${index + 1}`;
                const tab = document.createElement('div');
                tab.className = `bill-tab ${isActive}`;
                tab.onclick = () => switchBill(bill.id);
                tab.innerHTML = `<span>${title}</span><span class="close-tab-btn" onclick="event.stopPropagation(); closeBill('${bill.id}')">×</span>`;
                container.appendChild(tab);
            });
            const addBtn = document.createElement('button');
            addBtn.className = 'add-tab-btn'; addBtn.innerText = '+ Grahak';
            addBtn.onclick = () => createNewBill();
            container.appendChild(addBtn);
        }

        function closeBill(id) {
            if(confirm("Close this bill tab?")) {
                billsList = billsList.filter(b => b.id !== id);
                if (billsList.length === 0) createNewBill();
                else {
                    if (activeBillId === id) activeBillId = billsList[0].id;
                    saveToLocalMemory();
                    renderTabs();
                    loadActiveBillToUI();
                }
            }
        }

        function getActiveBill() { return billsList.find(b => b.id === activeBillId); }

        function updateCustomerInfo() {
            const activeBill = getActiveBill();
            if(!activeBill) return;
            activeBill.custName = document.getElementById('custName').value;
            activeBill.custPhone = document.getElementById('custPhone').value;
            saveToLocalMemory();
            renderTabs(); 
            triggerAutoSaveToCloud(); // 🔥 AUTO-SAVE TRIGGER
        }

        function loadActiveBillToUI() {
            const activeBill = getActiveBill();
            if(!activeBill) return;
            document.getElementById('custName').value = activeBill.custName;
            document.getElementById('custPhone').value = activeBill.custPhone;
            document.getElementById('syncStatus').innerText = activeBill.cloudKey ? "☁️ Auto-Saved" : "";
            renderCartTable();
        }

        function extractCleanPrice(priceStr) {
            if (!priceStr || priceStr.toLowerCase().includes("on call")) return 0;
            return parseFloat(priceStr.split('/')[0].replace(/[^0-9.]/g, '')) || 0;
        }

        // --- 🔥 3. AUTO-SAVE ENGINE (REAL-TIME) ---
        function triggerAutoSaveToCloud() {
            clearTimeout(saveTimeout);
            const activeBill = getActiveBill();
            if(!activeBill) return;
            
            // Save only if there's at least one item OR customer details are filled
            if(activeBill.items.length === 0 && !activeBill.custName && !activeBill.custPhone) return;

            document.getElementById('syncStatus').innerText = "⏳ Saving...";

            saveTimeout = setTimeout(() => {
                const payload = {
                    date: new Date().toLocaleString(),
                    timestamp: Date.now(),
                    custName: activeBill.custName || 'Guest',
                    custPhone: activeBill.custPhone || '',
                    items: activeBill.items || [],
                    total: getBillTotalAmt()
                };

                if (activeBill.cloudKey) {
                    fetch(`${DB_URL}/billing_history/${activeBill.cloudKey}.json`, {
                        method: 'PATCH', body: JSON.stringify(payload)
                    }).then(() => { document.getElementById('syncStatus').innerText = "☁️ Auto-Saved"; });
                } else {
                    fetch(`${DB_URL}/billing_history.json`, {
                        method: 'POST', body: JSON.stringify(payload)
                    }).then(res => res.json()).then(data => {
                        activeBill.cloudKey = data.name;
                        saveToLocalMemory();
                        document.getElementById('syncStatus').innerText = "☁️ Auto-Saved";
                    });
                }
            }, 1000); // 1 second delay to avoid spamming database on fast typing
        }

        // --- 4. ADD TO CART & RENDER LOGIC ---
        function injectProductToCart(foundProduct) {
            playBeep(); 
            const activeBill = getActiveBill();
            const existingCartItem = activeBill.items.find(item => item.id === foundProduct.id);
            if (existingCartItem) existingCartItem.qty += 1;
            else {
                activeBill.items.push({
                    id: foundProduct.id, name: foundProduct.name, unitPrice: extractCleanPrice(foundProduct.price), qty: 1
                });
            }
            saveToLocalMemory();
            renderCartTable();
            triggerAutoSaveToCloud(); // 🔥 AUTO-SAVE TRIGGER
        }

        function addItemToCartByBarcode(barcodeString) {
            if (!barcodeString) return;
            const foundProduct = productsDatabase.find(p => p.barcode && p.barcode.toLowerCase() === barcodeString.trim().toLowerCase());
            if (foundProduct) injectProductToCart(foundProduct);
            else alert(`❌ No product: ${barcodeString}`);
        }

        function processManualBarcode() {
            const inputField = document.getElementById('manualBarcode');
            addItemToCartByBarcode(inputField.value);
            inputField.value = ''; inputField.focus();
        }

        function handleManualEntry(event) { if (event.key === 'Enter') processManualBarcode(); }

        function showNameSuggestions(val) {
            const box = document.getElementById('nameSuggestions');
            box.innerHTML = ''; val = val.trim().toLowerCase();
            if(!val) { box.style.display = 'none'; return; }

            const matches = productsDatabase.filter(p => p.name.toLowerCase().includes(val));
            if(matches.length === 0) {
                box.innerHTML = '<div style="padding:10px; color:#aaa; font-size:11px; text-align:center;">No match...</div>';
                box.style.display = 'block'; return;
            }

            matches.forEach(p => {
                const div = document.createElement('div'); div.className = 'suggestion-item';
                let shortPrice = p.price.toLowerCase().includes("on call") ? "On Call" : '₹' + extractCleanPrice(p.price);
                div.innerHTML = `<span>${p.name}</span> <span class="sugg-price">${shortPrice}</span>`;
                div.onclick = () => { injectProductToCart(p); document.getElementById('searchItemName').value = ''; box.style.display = 'none'; };
                box.appendChild(div);
            });
            box.style.display = 'block';
        }

        window.addEventListener('click', (e) => { if(!document.getElementById('searchItemName').contains(e.target)) document.getElementById('nameSuggestions').style.display = 'none'; });

        function renderCartTable() {
            const activeBill = getActiveBill();
            const tbody = document.getElementById('cartBody');
            tbody.innerHTML = '';
            let grandTotal = 0;

            if (!activeBill || activeBill.items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#999; padding:20px;">Scan or Search items</td></tr>';
                document.getElementById('grandTotalAmt').innerText = '₹0';
                return;
            }

            activeBill.items.forEach((item, index) => {
                const itemTotal = item.qty * item.unitPrice;
                grandTotal += itemTotal;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.name}</td>
                    <td>₹${item.unitPrice}</td>
                    <td>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                            <span style="width: 15px; text-align:center;">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                    </td>
                    <td style="font-weight:bold; color:#0ef;">₹${itemTotal}</td>
                    <td class="del-item" onclick="removeCartItem(${index})">×</td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('grandTotalAmt').innerText = '₹' + grandTotal;
        }

        function updateQuantity(index, change) {
            const activeBill = getActiveBill();
            activeBill.items[index].qty += change;
            if (activeBill.items[index].qty <= 0) activeBill.items.splice(index, 1);
            saveToLocalMemory();
            renderCartTable();
            triggerAutoSaveToCloud(); // 🔥 AUTO-SAVE TRIGGER
        }

        function removeCartItem(index) {
            getActiveBill().items.splice(index, 1);
            saveToLocalMemory();
            renderCartTable();
            triggerAutoSaveToCloud(); // 🔥 AUTO-SAVE TRIGGER
        }

        function clearCurrentBill() {
            const activeBill = getActiveBill();
            if (activeBill.items.length > 0 && confirm("Clear all items in this bill?")) {
                
                // If it was saved to cloud, delete it from cloud too to keep history clean
                if(activeBill.cloudKey) {
                    fetch(`${DB_URL}/billing_history/${activeBill.cloudKey}.json`, { method: 'DELETE' });
                }

                activeBill.items = [];
                activeBill.custName = '';
                activeBill.custPhone = '';
                activeBill.cloudKey = null;
                saveToLocalMemory();
                loadActiveBillToUI();
                document.getElementById('syncStatus').innerText = "";
            }
        }

        function getBillTotalAmt() { return getActiveBill().items.reduce((sum, item) => sum + (item.qty * item.unitPrice), 0); }

        // --- 5. ACTION BUTTONS (WhatsApp & PDF) ---
        function sendWhatsAppBill() {
            const activeBill = getActiveBill();
            if (activeBill.items.length === 0) { alert("Bill is empty!"); return; }
            if (!activeBill.custPhone) { alert("Enter Customer's WhatsApp Number!"); document.getElementById('custPhone').focus(); return; }

            let textMsg = `*🧾 SAHU HOTEL - INVOICE*\n`;
            if(activeBill.custName) textMsg += `Customer: ${activeBill.custName}\n`;
            textMsg += `--------------------------\n`;
            activeBill.items.forEach((item, index) => { textMsg += `${index + 1}. ${item.name}\n   ${item.qty} x ₹${item.unitPrice} = *₹${item.qty * item.unitPrice}*\n`; });
            textMsg += `--------------------------\n*Grand Total: ₹${getBillTotalAmt()}*\n\n_Thank you for visiting!_\n📍 Jhurre Colony, Chhindwara`;

            let phoneStr = activeBill.custPhone.toString().trim();
            if(phoneStr.length === 10) phoneStr = "91" + phoneStr;
            window.open(`https://wa.me/${phoneStr}?text=${encodeURIComponent(textMsg)}`, '_blank');
        }

        function generatePDFBill() {
            const activeBill = getActiveBill();
            if (activeBill.items.length === 0) { alert("Bill is empty!"); return; }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');

            doc.setFont("helvetica", "bold"); doc.setFontSize(22);
            doc.text("SAHU HOTEL", 105, 20, null, null, "center");
            doc.setFont("helvetica", "normal"); doc.setFontSize(12);
            doc.text("Sahu Kirana & Restaurant", 105, 28, null, null, "center");
            doc.text("Jhurre Colony, Chhindwara, MP 480441", 105, 34, null, null, "center");
            doc.text("Contact: +91 8319332387", 105, 40, null, null, "center");
            doc.setLineWidth(0.5); doc.line(15, 45, 195, 45);

            doc.setFontSize(10);
            doc.text(`Date: ${new Date().toLocaleString()}`, 15, 53);
            if(activeBill.custName) doc.text(`Customer: ${activeBill.custName}`, 130, 53);
            if(activeBill.custPhone) doc.text(`Phone: ${activeBill.custPhone}`, 130, 59);

            const tableBody = activeBill.items.map((item, index) => [
                index + 1, item.name, `Rs. ${item.unitPrice}`, item.qty, `Rs. ${item.qty * item.unitPrice}`
            ]);

            doc.autoTable({
                startY: 65, head: [['S.No', 'Item', 'Rate', 'Qty', 'Total']], body: tableBody, theme: 'striped',
                headStyles: { fillColor: [0, 238, 255], textColor: [31, 36, 45], fontStyle: 'bold' },
            });

            const finalY = doc.lastAutoTable.finalY;
            doc.setFont("helvetica", "bold"); doc.setFontSize(14);
            doc.text(`Grand Total: Rs. ${getBillTotalAmt()}`, 145, finalY + 12);
            doc.setFont("helvetica", "italic"); doc.setFontSize(10);
            doc.text("Thank you for shopping with us! Visit Again.", 105, finalY + 25, null, null, "center");

            doc.save(activeBill.custName ? `Bill_${activeBill.custName}.pdf` : `Bill_${Date.now()}.pdf`);
        }

        // --- 6. HISTORY MODAL CONTROLS ---
        function openHistoryModal() {
            document.getElementById('historyModal').style.display = 'flex';
            const listContainer = document.getElementById('historyListContainer');
            listContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Fetching cloud history...</div>';

            fetch(`${DB_URL}/billing_history.json`)
            .then(res => res.json())
            .then(data => {
                listContainer.innerHTML = '';
                if(!data) { listContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No billing history found.</div>'; return; }
                const historyArray = Object.keys(data).map(key => ({ cloudKey: key, ...data[key] })).sort((a,b) => b.timestamp - a.timestamp);
                historyArray.forEach(bill => {
                    const card = document.createElement('div'); card.className = 'history-card';
                    card.innerHTML = `
                        <div class="history-info">
                            <h4>${bill.custName} <span style="font-size:11px; color:#aaa; font-weight:normal;">(${bill.items ? bill.items.length : 0} items)</span></h4>
                            <p>Date: ${bill.date}</p>
                            <p style="color:#0ef; font-weight:bold; margin-top:2px;">Total: ₹${bill.total}</p>
                        </div>
                        <div class="history-actions"><button onclick="reopenBillForEdit('${encodeURIComponent(JSON.stringify(bill))}')">✏️ Edit</button></div>
                    `;
                    listContainer.appendChild(card);
                });
            }).catch(() => { listContainer.innerHTML = '<div style="text-align: center; color: #ff4d4d; padding: 20px;">Error loading history.</div>'; });
        }

        function closeHistoryModal() { document.getElementById('historyModal').style.display = 'none'; }
        function reopenBillForEdit(encodedStr) { createNewBill(JSON.parse(decodeURIComponent(encodedStr))); closeHistoryModal(); }

        // --- 7. CAMERA SCANNER ENGINE ---
        function toggleScanner() {
            const btn = document.getElementById('camToggleBtn');
            const readerDiv = document.getElementById('reader');
            if (isScannerRunning) {
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.stop().then(() => {
                        html5QrcodeScanner.clear(); isScannerRunning = false;
                        btn.innerText = "Start Camera"; btn.style.background = "#0ef"; btn.style.color = "#1f242d";
                        readerDiv.style.border = "2px dashed #0ef";
                    }).catch(err => console.log(err));
                }
            } else {
                html5QrcodeScanner = new Html5Qrcode("reader");
                html5QrcodeScanner.start(
                    { facingMode: "environment" }, { fps: 10, qrbox: { width: 200, height: 150 } },
                    (decodedText) => { addItemToCartByBarcode(decodedText); html5QrcodeScanner.pause(); setTimeout(() => html5QrcodeScanner.resume(), 1500); },
                    (errorMessage) => { }
                ).then(() => {
                    isScannerRunning = true; btn.innerText = "Stop Camera"; btn.style.background = "#ff4d4d"; btn.style.color = "#fff";
                    readerDiv.style.border = "2px solid #28a745"; 
                }).catch(() => { alert("Camera access denied."); });
            }
        }
    </script>
